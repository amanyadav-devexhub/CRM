{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-container {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--danger-bg);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
        }
        .icon-circle .material-icons-round {
            font-size: 36px;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 2rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--border-color);
        }
        .btn:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon-circle">
            <span class="material-icons-round">gpp_bad</span>
        </div>
        <h1>Access Denied</h1>
        <p>You don't have the necessary permissions to access this page or perform this action. Please contact your clinic administrator if you believe this is a mistake.</p>
        
        <a href="javascript:history.back()" class="btn">
            &larr; Go Back
        </a>
    </div>
</body>
</html>
