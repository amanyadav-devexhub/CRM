{% extends "base.html" %}

{% block nav_appointments %}active{% endblock %}
{% block page_title %}Book Appointment{% endblock %}

{% block content %}

<form method="post" class="crud-form" autocomplete="off" id="bookingForm">
    {% csrf_token %}

    <div class="form-section">
        <div class="section-header">
            <span class="material-icons-round section-icon">event</span>
            <div><h3>Appointment Details</h3><p>Select patient, doctor, date and time</p></div>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label for="patient">Patient</label>
                <select id="patient" name="patient">
                    <option value="">— Walk-in / New —</option>
                    {% for p in patients %}
                    <option value="{{ p.pk }}">{{ p.full_name }} ({{ p.patient_id }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="patient_name">Or Enter Name (Walk-in)</label>
                <input type="text" id="patient_name" name="patient_name" placeholder="Walk-in patient name">
            </div>
            <div class="form-group">
                <label for="doctor">Doctor *</label>
                <select id="doctor" name="doctor" required>
                    <option value="">— Select Doctor —</option>
                    {% for doc in doctors %}
                    <option value="{{ doc.pk }}">Dr. {{ doc.name }} ({{ doc.specialization }}) — ₹{{ doc.consultation_fee }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="appointment_type">Type</label>
                <select id="appointment_type" name="appointment_type">
                    {% for code, label in type_choices %}
                    <option value="{{ code }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="appointment_date">Date *</label>
                <input type="date" id="appointment_date" name="appointment_date" required>
            </div>
            <div class="form-group">
                <label for="appointment_time">Time Slot *</label>
                <select id="appointment_time" name="appointment_time" required disabled>
                    <option value="">— Select doctor & date first —</option>
                </select>
                <div id="slotStatus" class="slot-status"></div>
            </div>
            <div class="form-group">
                <label for="fee">Fee (₹)</label>
                <input type="number" id="fee" name="fee" step="0.01" min="0" value="0">
            </div>
            <div class="form-group full-width">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3" placeholder="Optional notes..."></textarea>
            </div>
        </div>
    </div>

    <div class="form-actions">
        <a href="/appointments/" class="btn-secondary">Cancel</a>
        <button type="submit" class="btn-primary" id="submitBtn" disabled>
            <span class="material-icons-round">event_available</span> Book Appointment
        </button>
    </div>
</form>

<style>
    .crud-form { max-width: 800px; }
    .form-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; }
    .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .section-icon { font-size: 1.5rem; padding: .5rem; border-radius: 10px; background: rgba(59,130,246,.1); color: #3b82f6; }
    .section-header h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: .1rem; }
    .section-header p { font-size: .78rem; color: var(--text-secondary); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.15rem; }
    .form-group.full-width { grid-column: 1 / -1; }
    .form-group label { display: block; font-size: .8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: .35rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: .6rem .85rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-size: .85rem; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3b82f6; }
    .form-group select option { background: var(--bg-card); }
    .form-group textarea { resize: vertical; }
    .form-actions { display: flex; justify-content: flex-end; gap: .75rem; }
    .btn-primary { display: inline-flex; align-items: center; gap: .4rem; padding: .65rem 1.5rem; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; font-size: .875rem; font-weight: 600; border: none; cursor: pointer; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary { padding: .65rem 1.25rem; border-radius: 10px; background: var(--bg-secondary); color: var(--text-secondary); font-size: .875rem; text-decoration: none; border: 1px solid var(--border-color); }

    .slot-status { font-size: .75rem; margin-top: .35rem; min-height: 1.2em; }
    .slot-status.loading { color: #fbbf24; }
    .slot-status.success { color: #10b981; }
    .slot-status.error { color: #ef4444; }
    .slot-status.info { color: #60a5fa; }

    select option:disabled { color: var(--text-secondary); }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const doctorSelect = document.getElementById('doctor');
    const dateInput = document.getElementById('appointment_date');
    const timeSelect = document.getElementById('appointment_time');
    const slotStatus = document.getElementById('slotStatus');
    const submitBtn = document.getElementById('submitBtn');

    // Block past dates in the calendar
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    function fetchSlots() {
        const doctorId = doctorSelect.value;
        const date = dateInput.value;

        // Reset
        timeSelect.innerHTML = '<option value="">— Select a slot —</option>';
        timeSelect.disabled = true;
        submitBtn.disabled = true;
        slotStatus.textContent = '';
        slotStatus.className = 'slot-status';

        if (!doctorId || !date) {
            timeSelect.innerHTML = '<option value="">— Select doctor & date first —</option>';
            return;
        }

        slotStatus.textContent = 'Loading available slots...';
        slotStatus.className = 'slot-status loading';

        fetch(`/appointments/slots/?doctor=${doctorId}&date=${date}`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    slotStatus.textContent = data.error;
                    slotStatus.className = 'slot-status error';
                    return;
                }

                if (!data.slots || data.slots.length === 0) {
                    timeSelect.innerHTML = '<option value="">— No slots available —</option>';
                    slotStatus.textContent = 'No schedule configured for this doctor on this day.';
                    slotStatus.className = 'slot-status error';
                    return;
                }

                timeSelect.innerHTML = '<option value="">— Choose a time slot —</option>';
                let availableCount = 0;

                data.slots.forEach(slot => {
                    const opt = document.createElement('option');
                    opt.value = slot.time;
                    if (slot.available) {
                        opt.textContent = `${slot.display} — Available`;
                        availableCount++;
                    } else {
                        opt.textContent = `${slot.display} — Fully Booked`;
                        opt.disabled = true;
                        opt.style.color = 'rgba(241,245,249,.3)';
                    }
                    timeSelect.appendChild(opt);
                });

                timeSelect.disabled = false;
                slotStatus.textContent = `${availableCount} of ${data.slots.length} slots available for Dr. ${data.doctor}`;
                slotStatus.className = 'slot-status ' + (availableCount > 0 ? 'success' : 'error');
            })
            .catch(err => {
                slotStatus.textContent = 'Failed to load slots. Please try again.';
                slotStatus.className = 'slot-status error';
            });
    }

    doctorSelect.addEventListener('change', fetchSlots);
    dateInput.addEventListener('change', fetchSlots);

    timeSelect.addEventListener('change', () => {
        submitBtn.disabled = !timeSelect.value;
    });
});
</script>

{% endblock %}
