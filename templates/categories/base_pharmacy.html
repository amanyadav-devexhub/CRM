{% extends "base.html" %}

{% block topbar_title %}Pharmacy{% endblock %}
{% block extra_css %}
<style>
    /* Drawer (Slide-over) System */
    .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        z-index: 2000;
        display: none;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .drawer-overlay.active {
        display: block;
        opacity: 1;
    }

    .drawer-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: 440px;
        background: var(--bg-card); /* Deep dark background */
        border-left: 1px solid var(--border-color);
        box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        z-index: 2001;
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
    }

    .drawer-overlay.active .drawer-panel {
        transform: translateX(0);
    }

    .drawer-header {
        padding: 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-secondary);
    }

    .drawer-header h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #fff;
        margin: 0;
    }

    .drawer-body {
        padding: 24px;
        flex: 1;
        overflow-y: auto;
    }

    .drawer-footer {
        padding: 24px;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: var(--bg-secondary);
    }

    .drawer-close {
        background: var(--bg-secondary);
        border: none;
        color: var(--text-muted);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .drawer-close:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
    }

    /* Premium Form Styling inside Drawer */
    .drawer-form .form-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
    }

    .drawer-form .form-input, 
    .drawer-form .form-select {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: #fff;
        font-size: 0.95rem;
        margin-bottom: 20px;
        transition: all 0.2s;
    }

    .drawer-form .form-input:focus, 
    .drawer-form .form-select:focus {
        background: var(--bg-secondary);
        border-color: var(--accent-orange);
        outline: none;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }

    .drawer-form .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    function openDrawer(id) {
        const drawer = document.getElementById(id);
        if (drawer) {
            drawer.style.display = 'block';
            setTimeout(() => drawer.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }
    }

    function closeDrawer(id) {
        const drawer = document.getElementById(id);
        if (drawer) {
            drawer.classList.remove('active');
            setTimeout(() => {
                drawer.style.display = 'none';
                document.body.style.overflow = '';
            }, 400);
        }
    }

    // Close on backdrop click
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('drawer-overlay')) {
            closeDrawer(e.target.id);
        }
    });
</script>
{% endblock %}
