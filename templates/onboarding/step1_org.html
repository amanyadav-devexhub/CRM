{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Your Organization — HealthCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --card: #111827;
            --border: rgba(255, 255, 255, .06);
            --text: #f1f5f9;
            --muted: rgba(241, 245, 249, .5);
            --accent: #3b82f6;
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            --green: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(16, 185, 129, .05) 0%, transparent 70%);
            pointer-events: none;
        }

        .wizard-container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        /* Steps indicator */
        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            gap: .5rem;
        }

        .step {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .8rem;
            font-weight: 500;
            color: var(--muted);
        }

        .step.active {
            color: var(--accent);
        }

        .step.done {
            color: var(--green);
        }

        .step .num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, .12);
        }

        .step.active .num {
            border-color: var(--accent);
            background: rgba(59, 130, 246, .15);
            color: var(--accent);
        }

        .step.done .num {
            border-color: var(--green);
            background: rgba(16, 185, 129, .15);
            color: var(--green);
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, .08);
        }

        .wizard-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
        }

        .wizard-card h2 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: .4rem;
        }

        .wizard-card .subtitle {
            color: var(--muted);
            font-size: .875rem;
            margin-bottom: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: .4rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: .75rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            font-size: .925rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, .25);
        }

        .form-group select option {
            background: var(--card);
        }

        /* Category selector cards */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: .75rem;
            margin-bottom: 1.25rem;
        }

        .category-option {
            position: relative;
            cursor: pointer;
        }

        .category-option input {
            position: absolute;
            opacity: 0;
        }

        .category-option .cat-card {
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .02);
            transition: all .2s;
        }

        .category-option input:checked+.cat-card {
            border-color: var(--accent);
            background: rgba(59, 130, 246, .08);
        }

        .category-option .cat-card:hover {
            border-color: rgba(255, 255, 255, .15);
        }

        .cat-icon {
            font-size: 1.5rem;
            margin-bottom: .25rem;
        }

        .cat-label {
            font-size: .85rem;
            font-weight: 600;
        }

        .cat-desc {
            font-size: .7rem;
            color: var(--muted);
        }

        .error-list {
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .2);
            border-radius: 10px;
            padding: .75rem 1rem;
            margin-bottom: 1.25rem;
            list-style: none;
        }

        .error-list li {
            font-size: .85rem;
            color: var(--error);
            padding: .15rem 0;
        }

        .btn-next {
            width: 100%;
            padding: .85rem;
            border: none;
            border-radius: 12px;
            background: var(--gradient);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }

        .btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, .3);
        }
    </style>
</head>

<body>
    <div class="wizard-container">
        <!-- Steps -->
        <div class="steps">
            <div class="step active">
                <div class="num">1</div> Organization
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="num">2</div> Plan
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="num">3</div> Confirm
            </div>
        </div>

        <div class="wizard-card">
            <h2>🏥 Organization Details</h2>
            <p class="subtitle">Tell us about your healthcare organization</p>

            {% if errors %}
            <ul class="error-list">
                {% for err in errors %}<li>{{ err }}</li>{% endfor %}
            </ul>
            {% endif %}

            <form method="post" action="/onboarding/">
                {% csrf_token %}

                <div class="form-group">
                    <label>Organization Name</label>
                    <input type="text" name="org_name" placeholder="City Health Clinic"
                        value="{{ data.org_name|default:'' }}" required autofocus>
                </div>

                <label
                    style="font-size:.85rem; font-weight:500; color:rgba(241,245,249,.5); margin-bottom:.5rem; display:block;">Category</label>
                <div class="category-grid">
                    <label class="category-option">
                        <input type="radio" name="category" value="CLINIC" {% if data.category == "CLINIC" or not data.category %}checked{% endif %}>
                        <div class="cat-card">
                            <div class="cat-icon">🏥</div>
                            <div class="cat-label">Clinic</div>
                            <div class="cat-desc">Small to mid practice</div>
                        </div>
                    </label>
                    <label class="category-option">
                        <input type="radio" name="category" value="HOSPITAL" {% if data.category == "HOSPITAL" %}checked{% endif %}>
                        <div class="cat-card">
                            <div class="cat-icon">🏨</div>
                            <div class="cat-label">Hospital</div>
                            <div class="cat-desc">Multi-department</div>
                        </div>
                    </label>
                    <label class="category-option">
                        <input type="radio" name="category" value="PHARMACY" {% if data.category == "PHARMACY" %}checked{% endif %}>
                        <div class="cat-card">
                            <div class="cat-icon">💊</div>
                            <div class="cat-label">Pharmacy</div>
                            <div class="cat-desc">Retail / chain pharmacy</div>
                        </div>
                    </label>
                    <label class="category-option">
                        <input type="radio" name="category" value="LAB" {% if data.category == "LAB" %}checked{% endif %}>
                        <div class="cat-card">
                            <div class="cat-icon">🔬</div>
                            <div class="cat-label">Lab</div>
                            <div class="cat-desc">Diagnostics & testing</div>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label>Organization Email</label>
                    <input type="email" name="org_email" placeholder="info@clinic.com"
                        value="{{ data.org_email|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="org_phone" placeholder="+91 98765 43210"
                        value="{{ data.org_phone|default:'' }}">
                </div>

                <button type="submit" class="btn-next">Continue to Plan Selection →</button>
            </form>
        </div>
    </div>
</body>

</html>
