{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Apply theme early to prevent flash
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — HealthCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --card: #111827;
            --border: rgba(255, 255, 255, .06);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-focus-shadow: rgba(59, 130, 246, 0.15);
            --input-placeholder: rgba(255, 255, 255, 0.25);
            --error-bg: rgba(239, 68, 68, 0.08);
            --error-border: rgba(239, 68, 68, 0.2);
            --text: #f1f5f9;
            --muted: rgba(241, 245, 249, .5);
            --accent: #3b82f6;
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            --error: #ef4444;
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: rgba(0, 0, 0, .08);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.04);
            --input-focus-shadow: rgba(59, 130, 246, 0.15);
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --error-bg: rgba(239, 68, 68, 0.08);
            --error-border: rgba(239, 68, 68, 0.2);
            --text: #0f172a;
            --muted: rgba(15, 23, 42, .6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(59, 130, 246, .06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-brand a {
            text-decoration: none;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }

        .auth-brand .logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
        }

        .auth-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: .4rem;
        }

        .auth-card .subtitle {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 1.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: .4rem;
        }

        .form-group input {
            width: 100%;
            padding: .75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            font-size: .925rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--input-focus-shadow);
        }

        .form-group input::placeholder {
            color: var(--input-placeholder);
        }

        .error-list {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 10px;
            padding: .75rem 1rem;
            margin-bottom: 1.25rem;
            list-style: none;
        }

        .error-list li {
            font-size: .85rem;
            color: var(--error);
            padding: .15rem 0;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .error-list li::before {
            content: '!';
            font-weight: 700;
        }

        .btn-submit {
            width: 100%;
            padding: .85rem;
            border: none;
            border-radius: 12px;
            background: var(--gradient);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            margin-top: .5rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, .3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .875rem;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-brand">
            <a href="/">
                <div class="logo">H</div>
                <h1>HealthCRM</h1>
            </a>
        </div>

        <div class="auth-card">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email address and we'll send you a verification code.</p>

            {% if errors %}
            <ul class="error-list">
                {% for err in errors %}
                <li>{{ err }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
                </div>

                <button type="submit" class="btn-submit">Send Code →</button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>

    


    <!-- Theme Toggle -->
    <button id="themeToggle" title="Toggle Theme"
        style="position: fixed; top: 20px; right: 20px; z-index: 9999; width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border, rgba(255,255,255,0.1)); background: var(--card, #111827); color: var(--text, #f1f5f9); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
        <span class="material-icons-round" id="themeIcon" style="font-size: 1.2rem;">light_mode</span>
    </button>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toggleBtn = document.getElementById("themeToggle");
            const toggleIcon = document.getElementById("themeIcon");
            if (toggleBtn && toggleIcon) {
                if (document.documentElement.getAttribute("data-theme") === "light") {
                    toggleIcon.textContent = "dark_mode";
                } else {
                    toggleIcon.textContent = "light_mode";
                }
                toggleBtn.addEventListener("click", () => {
                    let current = document.documentElement.getAttribute("data-theme");
                    let newTheme = current === "light" ? "dark" : "light";
                    document.documentElement.setAttribute("data-theme", newTheme);
                    localStorage.setItem("theme", newTheme);
                    toggleIcon.textContent = newTheme === "light" ? "dark_mode" : "light_mode";
                    window.dispatchEvent(new Event("themeChanged"));
                });
            }
        });
    </script>

</body>

</html>
