{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed — HealthCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --card: #111827;
            --border: rgba(255, 255, 255, .06);
            --text: #f1f5f9;
            --muted: rgba(241, 245, 249, .5);
            --accent: #3b82f6;
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(59, 130, 246, .06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-brand a {
            text-decoration: none;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }

        .auth-brand .logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: .6rem;
        }

        .auth-card .subtitle {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon .material-icons-round {
            font-size: 32px;
            color: #fff;
        }

        .btn-submit {
            display: inline-block;
            padding: .85rem 2rem;
            border: none;
            border-radius: 12px;
            background: var(--gradient);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            text-decoration: none;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, .3);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-brand">
            <a href="/">
                <div class="logo">H</div>
                <h1>HealthCRM</h1>
            </a>
        </div>

        <div class="auth-card">
            <div class="success-icon">
                <span class="material-icons-round">check_circle</span>
            </div>
            <h2>Password Changed!</h2>
            <p class="subtitle">
                Your password has been successfully reset. You can now sign in with your new password.
            </p>

            <a href="{% url 'login' %}" class="btn-submit">Sign In →</a>
        </div>
    </div>
</body>

</html>
