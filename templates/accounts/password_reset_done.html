{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Apply theme early to prevent flash
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent — HealthCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --card: #111827;
            --border: rgba(255, 255, 255, .06);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-focus-shadow: rgba(59, 130, 246, 0.15);
            --input-placeholder: rgba(255, 255, 255, 0.25);
            --error-bg: rgba(239, 68, 68, 0.08);
            --error-border: rgba(239, 68, 68, 0.2);
            --text: #f1f5f9;
            --muted: rgba(241, 245, 249, .5);
            --accent: #3b82f6;
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: rgba(0, 0, 0, .08);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.04);
            --input-focus-shadow: rgba(59, 130, 246, 0.15);
            --input-placeholder: rgba(0, 0, 0, 0.4);
            --error-bg: rgba(239, 68, 68, 0.08);
            --error-border: rgba(239, 68, 68, 0.2);
            --text: #0f172a;
            --muted: rgba(15, 23, 42, .6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(59, 130, 246, .06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-brand a {
            text-decoration: none;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }

        .auth-brand .logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card {
            background: var(--card);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
            text-align: center;
        }

        .auth-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: .6rem;
        }

        .auth-card .subtitle {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 1.75rem;
            line-height: 1.6;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .success-icon .material-icons-round {
            font-size: 32px;
            color: #fff;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .875rem;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-brand">
            <a href="/">
                <div class="logo">H</div>
                <h1>HealthCRM</h1>
            </a>
        </div>

        <div class="auth-card">
            <div class="success-icon">
                <span class="material-icons-round">mark_email_read</span>
            </div>
            <h2>Check Your Email</h2>
            <p class="subtitle">
                If an account exists with that email, we've sent password reset instructions.
                Please check your inbox and spam folder.
            </p>

            <div class="auth-footer">
                <a href="{% url 'login' %}">← Back to Sign In</a>
            </div>
        </div>
    </div>

    


    <!-- Theme Toggle -->
    <button id="themeToggle" title="Toggle Theme"
        style="position: fixed; top: 20px; right: 20px; z-index: 9999; width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border, rgba(255,255,255,0.1)); background: var(--card, #111827); color: var(--text, #f1f5f9); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
        <span class="material-icons-round" id="themeIcon" style="font-size: 1.2rem;">light_mode</span>
    </button>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toggleBtn = document.getElementById("themeToggle");
            const toggleIcon = document.getElementById("themeIcon");
            if (toggleBtn && toggleIcon) {
                if (document.documentElement.getAttribute("data-theme") === "light") {
                    toggleIcon.textContent = "dark_mode";
                } else {
                    toggleIcon.textContent = "light_mode";
                }
                toggleBtn.addEventListener("click", () => {
                    let current = document.documentElement.getAttribute("data-theme");
                    let newTheme = current === "light" ? "dark" : "light";
                    document.documentElement.setAttribute("data-theme", newTheme);
                    localStorage.setItem("theme", newTheme);
                    toggleIcon.textContent = newTheme === "light" ? "dark_mode" : "light_mode";
                    window.dispatchEvent(new Event("themeChanged"));
                });
            }
        });
    </script>

</body>

</html>
