{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — HealthCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17; --card: #111827; --border: rgba(255, 255, 255, .06);
            --input-border: rgba(255, 255, 255, 0.1); --input-bg: rgba(255, 255, 255, 0.04);
            --text: #f1f5f9; --muted: rgba(241, 245, 249, .5); --accent: #3b82f6;
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899); --error: #ef4444;
        }
        :root[data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --border: rgba(0, 0, 0, .08);
            --input-border: rgba(0, 0, 0, 0.1); --input-bg: rgba(0, 0, 0, 0.04);
            --text: #0f172a; --muted: rgba(15, 23, 42, .6);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-container { width: 100%; max-width: 440px; position: relative; z-index: 1; }
        .auth-brand { text-align: center; margin-bottom: 2rem; }
        .auth-brand a { text-decoration: none; color: var(--text); display: inline-flex; align-items: center; gap: .5rem; }
        .auth-brand .logo { width: 42px; height: 42px; border-radius: 12px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .auth-card { background: var(--card); border-radius: 20px; padding: 2.5rem; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0, 0, 0, .3); }
        .auth-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: .4rem; }
        .auth-card .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: .85rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; }
        .form-group input { width: 100%; padding: .75rem 1rem; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); font-size: .925rem; transition: all .2s; }
        .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .btn-submit { width: 100%; padding: .85rem; border: none; border-radius: 12px; background: var(--gradient); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59, 130, 246, .3); }
        .error-list { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 10px; padding: .75rem 1rem; margin-bottom: 1.25rem; list-style: none; }
        .error-list li { font-size: .85rem; color: var(--error); display: flex; align-items: center; gap: .4rem; }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-brand">
            <a href="/">
                <div class="logo">H</div>
                <h1>HealthCRM</h1>
            </a>
        </div>

        <div class="auth-card">
            <h2>New Password</h2>
            <p class="subtitle">Set a strong password for your account</p>

            {% if errors %}
            <ul class="error-list">
                {% for err in errors %}
                <li>{{ err }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autofocus>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn-submit">Update Password →</button>
            </form>
        </div>
    </div>
</body>
</html>
